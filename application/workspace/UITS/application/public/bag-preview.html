<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>背包 UI 预览 — bag.bp</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0c14;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 40px 20px;
  gap: 20px;
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  color: #e0e8fc;
}

.canvas {
  position: relative;
  width: 1440px;
  height: 900px;
  background: #070810;
  overflow: hidden;
  border: 1px solid #1a1e2e;
  transform-origin: top center;
}

/* BackdropArt — 全屏场景底图 */
.backdrop {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 40% 45%, #12162a 0%, #070810 70%);
  pointer-events: none;
}
.backdrop::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 30%, rgba(40,60,120,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 70%, rgba(20,30,60,0.06) 0%, transparent 50%);
  pointer-events: none;
}

/* CapacityPlate + CapacityLabel */
.capacity {
  position: absolute;
  left: 302px; top: 113px;
  width: 140px; height: 44px;
  background: linear-gradient(135deg, #1a1f35 0%, #141828 100%);
  border: 1px solid #2a3050;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  letter-spacing: 2px;
  color: #c8d4f8;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
}
.capacity .used { color: #8eaaee; }
.capacity .sep  { color: #4a5680; margin: 0 4px; }

/* CloseButton */
.close-btn {
  position: absolute;
  left: 640px; top: 140px;
  width: 56px; height: 58px;
  background: linear-gradient(135deg, #1e2340 0%, #161a2e 100%);
  border: 1px solid #2a3055;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  color: #d0d8f0;
  cursor: pointer;
  transition: all 0.15s;
}
.close-btn:hover {
  background: linear-gradient(135deg, #283060 0%, #1e2444 100%);
  border-color: #4060a0;
  color: #fff;
}

/* Tabs */
.tabs {
  position: absolute;
  left: 173px; top: 220px;
  width: 127px; height: 347px;
  display: flex;
  flex-direction: column;
  gap: 9px;
}
.tab-btn {
  width: 127px;
  height: 80px;
  background: linear-gradient(135deg, #161a2c 0%, #111524 100%);
  border: 1px solid #222840;
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  font-size: 18px;
  color: #7a92c0;
  cursor: pointer;
  transition: all 0.15s;
}
.tab-btn:hover {
  background: linear-gradient(135deg, #1e2844 0%, #182038 100%);
  border-color: #3a4a78;
  color: #c0d0f0;
}
.tab-btn.active {
  background: linear-gradient(135deg, #222e52 0%, #1a2440 100%);
  border-color: #4060a0;
  color: #e0ecff;
  box-shadow: inset 0 0 12px rgba(60,100,200,0.08);
}
.tab-icon {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

/* InventoryPanel */
.inventory-panel {
  position: absolute;
  left: 300px; top: 160px;
  width: 385px; height: 486px;
  background: linear-gradient(180deg, #111528 0%, #0d1020 100%);
  border: 1px solid #1e2440;
  border-radius: 10px;
  overflow: hidden;
}

/* GridContainer */
.grid {
  position: absolute;
  left: 12px; top: 12px;
  right: 12px; bottom: 12px;
  display: grid;
  grid-template-columns: repeat(3, 113px);
  grid-template-rows: repeat(4, 108px);
  gap: 10px 11px;
  align-content: start;
}

/* Item slot */
.slot {
  width: 113px;
  height: 108px;
  background: linear-gradient(135deg, #171c30 0%, #121628 100%);
  border: 1px solid #252c48;
  border-radius: 8px;
  position: relative;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.slot:hover {
  border-color: #4060a0;
  box-shadow: 0 0 8px rgba(60,100,200,0.15);
}
.slot.selected {
  border-color: #5080d0;
  background: linear-gradient(135deg, #1e2848 0%, #182040 100%);
  box-shadow: 0 0 12px rgba(70,120,220,0.2);
}
.slot.empty {
  opacity: 0.35;
  cursor: default;
}
.slot-icon {
  font-size: 32px;
  line-height: 1;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
}
.slot-qty {
  position: absolute;
  right: 8px; bottom: 6px;
  font-size: 12px;
  color: #c8d4f8;
  text-shadow: 0 1px 2px rgba(8,12,20,0.9);
}

/* Tooltip */
.slot[data-tooltip]:hover::after {
  content: attr(data-tooltip);
  position: absolute;
  left: 120px; top: 0;
  width: 180px;
  padding: 10px 12px;
  background: #0e1224;
  border: 1px solid #2a3258;
  border-radius: 6px;
  font-size: 13px;
  line-height: 1.5;
  color: #b8c4e0;
  white-space: pre-line;
  z-index: 100;
  pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}

/* Scale control */
.scale-bar {
  position: fixed;
  top: 12px; right: 16px;
  display: flex;
  gap: 6px;
  align-items: center;
  font-size: 13px;
  color: #6070a0;
  z-index: 200;
}
.scale-bar button {
  background: #161a2c;
  border: 1px solid #2a3050;
  border-radius: 4px;
  color: #8090c0;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 12px;
}
.scale-bar button:hover { background: #1e2444; color: #c0d0f0; }
.scale-bar button.active { background: #222e52; border-color: #4060a0; color: #e0ecff; }

/* Node Tree Panel */
.tree-panel {
  width: 300px;
  min-height: 600px;
  background: #0c0f1a;
  border: 1px solid #1a1e2e;
  border-radius: 8px;
  padding: 16px;
  flex-shrink: 0;
  overflow-y: auto;
  max-height: 90vh;
}
.tree-panel h3 {
  font-size: 14px;
  color: #6880b0;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #1a1e2e;
  letter-spacing: 1px;
}
.tree-node {
  display: flex;
  align-items: center;
  padding: 3px 0;
  font-size: 13px;
  cursor: pointer;
  border-radius: 4px;
  transition: background 0.1s;
}
.tree-node:hover {
  background: rgba(40,60,120,0.12);
}
.tree-node.highlight {
  background: rgba(60,100,200,0.15);
  outline: 1px solid rgba(80,128,208,0.3);
}
.tree-indent { display: inline-block; width: 16px; flex-shrink: 0; }
.tree-branch {
  color: #3a4060;
  font-size: 12px;
  width: 16px;
  text-align: center;
  flex-shrink: 0;
  user-select: none;
}
.tree-icon {
  width: 16px;
  height: 16px;
  margin-right: 6px;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  border-radius: 3px;
}
.tree-icon.control    { background: #2a3a20; color: #80c060; }
.tree-icon.colorrect  { background: #3a2a20; color: #d0a060; }
.tree-icon.texturerect{ background: #2a2a3a; color: #8080d0; }
.tree-icon.label      { background: #2a3030; color: #60c0a0; }
.tree-icon.button     { background: #3a2a30; color: #d080a0; }
.tree-icon.vbox       { background: #2a3040; color: #60a0d0; }
.tree-icon.gridcontainer { background: #302a3a; color: #a080d0; }
.tree-name {
  color: #c0c8e0;
  white-space: nowrap;
}
.tree-type {
  color: #4a5478;
  margin-left: 6px;
  font-size: 11px;
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="scale-bar">
  缩放:
  <button onclick="setScale(0.5)">50%</button>
  <button onclick="setScale(0.65)">65%</button>
  <button onclick="setScale(0.8)" class="active">80%</button>
  <button onclick="setScale(1)">100%</button>
</div>

<div class="canvas" id="canvas">
  <div class="backdrop"></div>

  <!-- Capacity -->
  <div class="capacity">
    <span class="used">08</span>
    <span class="sep">/</span>
    <span>12</span>
  </div>

  <!-- CloseButton -->
  <div class="close-btn" title="关闭">×</div>

  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <div class="tab-btn active" data-cat="equipment">
      <span class="tab-icon">⚔</span>装备
    </div>
    <div class="tab-btn" data-cat="item">
      <span class="tab-icon">🧪</span>道具
    </div>
    <div class="tab-btn" data-cat="material">
      <span class="tab-icon">🪶</span>材料
    </div>
    <div class="tab-btn" data-cat="currency">
      <span class="tab-icon">🪙</span>通货
    </div>
  </div>

  <!-- InventoryPanel -->
  <div class="inventory-panel">
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- Node Tree Panel -->
<div class="tree-panel" id="treePanel">
  <h3>🌿 节点树 — bag.bp</h3>
  <div id="treeContent"></div>
</div>

<script>
const TREE_NODES = [
  { name:"RootCanvas",       type:"Control",       depth:0, domId:"canvas" },
  { name:"Background",       type:"ColorRect",     depth:1, domClass:"backdrop" },
  { name:"BackdropArt",      type:"TextureRect",   depth:1, domClass:"backdrop" },
  { name:"CapacityPlate",    type:"TextureRect",   depth:1, domClass:"capacity" },
  { name:"CapacityLabel",    type:"Label",          depth:1, domClass:"capacity" },
  { name:"CloseButton",      type:"Button",         depth:1, domClass:"close-btn" },
  { name:"Tabs",             type:"VBoxContainer", depth:1, domId:"tabs" },
  { name:"TabEquipment",     type:"Button",         depth:2, domAttr:["data-cat","equipment"] },
  { name:"TabItem",          type:"Button",         depth:2, domAttr:["data-cat","item"] },
  { name:"TabMaterial",      type:"Button",         depth:2, domAttr:["data-cat","material"] },
  { name:"TabCurrency",      type:"Button",         depth:2, domAttr:["data-cat","currency"] },
  { name:"InventoryPanel",   type:"Control",       depth:1, domClass:"inventory-panel" },
  { name:"InventoryPanelArt",type:"TextureRect",   depth:2, domClass:"inventory-panel" },
  { name:"GridContainer",    type:"GridContainer", depth:2, domId:"grid" },
  { name:"Item01",           type:"Button",         depth:3, domSlot:0 },
  { name:"Item02",           type:"Button",         depth:3, domSlot:1 },
  { name:"Item03",           type:"Button",         depth:3, domSlot:2 },
  { name:"Item04",           type:"Button",         depth:3, domSlot:3 },
  { name:"Item05",           type:"Button",         depth:3, domSlot:4 },
  { name:"Item06",           type:"Button",         depth:3, domSlot:5 },
  { name:"Item07",           type:"Button",         depth:3, domSlot:6 },
  { name:"Item08",           type:"Button",         depth:3, domSlot:7 },
  { name:"Item09",           type:"Button",         depth:3, domSlot:8 },
  { name:"Item10",           type:"Button",         depth:3, domSlot:9 },
  { name:"Item11",           type:"Button",         depth:3, domSlot:10 },
  { name:"Item12",           type:"Button",         depth:3, domSlot:11 }
];

function iconClass(type) {
  const map = {
    "Control":"control","ColorRect":"colorrect","TextureRect":"texturerect",
    "Label":"label","Button":"button","VBoxContainer":"vbox","GridContainer":"gridcontainer"
  };
  return map[type] || "control";
}

function iconLetter(type) {
  const map = {
    "Control":"C","ColorRect":"■","TextureRect":"🖼","Label":"A",
    "Button":"▣","VBoxContainer":"⇕","GridContainer":"⊞"
  };
  return map[type] || "?";
}

function renderTree() {
  const container = document.getElementById("treeContent");
  let html = "";
  for (let i = 0; i < TREE_NODES.length; i++) {
    const n = TREE_NODES[i];
    const indents = Array(Math.max(0, n.depth)).fill('<span class="tree-indent"></span>').join("");
    const branch = n.depth > 0
      ? (i < TREE_NODES.length - 1 && TREE_NODES.slice(i+1).some(x => x.depth <= n.depth && x.depth > 0)
         ? '<span class="tree-branch">├</span>'
         : '<span class="tree-branch">└</span>')
      : "";
    html += `<div class="tree-node" data-tree-idx="${i}">
      ${indents}${branch}
      <span class="tree-icon ${iconClass(n.type)}">${iconLetter(n.type)}</span>
      <span class="tree-name">${n.name}</span>
      <span class="tree-type">${n.type}</span>
    </div>`;
  }
  container.innerHTML = html;

  container.querySelectorAll(".tree-node").forEach(el => {
    el.addEventListener("mouseenter", () => highlightNode(parseInt(el.dataset.treeIdx), true));
    el.addEventListener("mouseleave", () => highlightNode(parseInt(el.dataset.treeIdx), false));
  });
}

function highlightNode(idx, on) {
  const n = TREE_NODES[idx];
  document.querySelectorAll(".tree-node").forEach(el => el.classList.remove("highlight"));
  if (on) {
    document.querySelector(`[data-tree-idx="${idx}"]`)?.classList.add("highlight");
  }
  // Highlight corresponding DOM element
  let target = null;
  if (n.domId) target = document.getElementById(n.domId);
  else if (n.domClass) target = document.querySelector("." + n.domClass);
  else if (n.domAttr) target = document.querySelector(`[${n.domAttr[0]}="${n.domAttr[1]}"]`);
  else if (n.domSlot !== undefined) {
    const slots = document.querySelectorAll("#grid .slot");
    if (slots[n.domSlot]) target = slots[n.domSlot];
  }
  if (target) {
    if (on) {
      target.style.outline = "2px solid #5080d0";
      target.style.outlineOffset = "2px";
    } else {
      target.style.outline = "";
      target.style.outlineOffset = "";
    }
  }
}

const ITEMS = [
  { title:"龙雀古剑", subtitle:"装备 · 战刃", category:"equipment", quantity:1,  icon:"⚔️", stats:"攻击力 +248 / 会心 +12%", detail:"主战用的暗纹长剑。" },
  { title:"回灵丹",   subtitle:"道具 · 恢复", category:"item",      quantity:18, icon:"🧪", stats:"恢复 1200 气血 / 持有 18", detail:"用于续航的常备丹药。" },
  { title:"离火符卷", subtitle:"道具 · 卷轴", category:"item",      quantity:6,  icon:"📜", stats:"范围爆散 / 持有 6", detail:"攻伐型法符卷轴。" },
  { title:"玄甲护心盾",subtitle:"装备 · 防具",category:"equipment", quantity:1,  icon:"🛡️", stats:"格挡 +18% / 生命 +520", detail:"偏重稳固的护心盾。" },
  { title:"踏云羽令", subtitle:"材料 · 灵羽", category:"material",  quantity:3,  icon:"🪶", stats:"轻灵材料 / 持有 3", detail:"用于轻甲与灵饰制作。" },
  { title:"遗迹门钥", subtitle:"材料 · 钥匙", category:"material",  quantity:1,  icon:"🗝️", stats:"遗迹开启 / 持有 1", detail:"开启密门的关键门钥。" },
  { title:"风行灵弓", subtitle:"装备 · 远袭", category:"equipment", quantity:1,  icon:"🏹", stats:"攻击 +176 / 攻速 +9%", detail:"轻快的追风灵弓。" },
  { title:"魂银钱匣", subtitle:"通货 · 钱匣", category:"currency",  quantity:12840, icon:"🪙", stats:"流通货币 / 持有 12840", detail:"用于交易与锻造的标准通货。" }
];

let activeCat = "equipment";
let selectedIdx = 0;

function fmtQty(q) {
  return q >= 10000 ? (q/1000).toFixed(1)+"k" : String(q).padStart(2,"0");
}

function renderGrid() {
  const grid = document.getElementById("grid");
  const visible = ITEMS.filter(i => i.category === activeCat);
  const total = 12;
  let html = "";
  for (let i = 0; i < total; i++) {
    if (i < visible.length) {
      const it = visible[i];
      const sel = i === selectedIdx ? " selected" : "";
      const tip = `${it.title}\n${it.subtitle}\n${it.stats}\n${it.detail}`;
      html += `<div class="slot${sel}" data-idx="${i}" data-tooltip="${tip}">
        <span class="slot-icon">${it.icon}</span>
        <span class="slot-qty">x${fmtQty(it.quantity)}</span>
      </div>`;
    } else {
      html += `<div class="slot empty"></div>`;
    }
  }
  grid.innerHTML = html;

  grid.querySelectorAll(".slot:not(.empty)").forEach(el => {
    el.addEventListener("click", () => {
      selectedIdx = parseInt(el.dataset.idx);
      renderGrid();
    });
  });

  // Update capacity
  const cap = document.querySelector(".capacity");
  cap.innerHTML = `<span class="used">${String(ITEMS.length).padStart(2,"0")}</span><span class="sep">/</span><span>${String(total).padStart(2,"0")}</span>`;
}

document.getElementById("tabs").addEventListener("click", e => {
  const btn = e.target.closest(".tab-btn");
  if (!btn) return;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeCat = btn.dataset.cat;
  selectedIdx = 0;
  renderGrid();
});

document.querySelector(".close-btn").addEventListener("click", () => {
  document.getElementById("canvas").style.opacity = "0";
  setTimeout(() => document.getElementById("canvas").style.opacity = "1", 600);
});

function setScale(s) {
  document.getElementById("canvas").style.transform = `scale(${s})`;
  document.querySelectorAll(".scale-bar button").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
}

// init
setScale(0.8);
renderGrid();
renderTree();
</script>
</body>
</html>
