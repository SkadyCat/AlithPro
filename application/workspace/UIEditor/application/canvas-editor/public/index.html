<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas Editor</title>
  <link rel="stylesheet" href="style.css?v=1773387913659" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
</head>
<body>
  <!-- 顶部菜单 -->
  <header id="top-menu">
    <div class="logo">🎨 Canvas Editor</div>
    <div class="toolbar">
      <button id="btn-select" class="tool-btn active" title="选择/移动 (V)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-7 1-4 7z"/></svg>
        选择
      </button>
      <button id="btn-draw" class="tool-btn" title="绘制边框 (B)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        绘制
      </button>
      <div class="separator"></div>
      <button id="btn-delete" class="tool-btn danger" title="删除选中 (Del)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        删除
      </button>
      <button id="btn-clear" class="tool-btn danger" title="清空画布">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        清空
      </button>
      <div class="separator"></div>
      <button id="btn-undo" class="tool-btn" title="撤销 (Ctrl+Z)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
        撤销
      </button>
      <button id="btn-redo" class="tool-btn" title="重做 (Ctrl+Y)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
        重做
      </button>
      <div class="separator"></div>
      <button id="zoneHighlightBtn" class="tool-btn" onclick="toggleZoneHighlight()" title="区域高亮 — 悬停识别界面区域 (Esc停止悬停，✕关闭面板)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
        </svg>
        识别
      </button>
      <div class="separator"></div>
      <button id="btn-preview-mode" class="tool-btn" title="预览模式：隐藏编辑器辅助线，查看真实UI效果 (P)" onclick="togglePreviewMode()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        布局视图
      </button>
      <button id="btn-docs" class="tool-btn" title="文档" onclick="openDocsPanel && openDocsPanel()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
        文档
      </button>
      <button id="btn-assets" class="tool-btn" title="查看当前界面引用的所有资源 (Shift+R)" onclick="openAssetsPanel()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        资源
      </button>
      <button id="btn-export-bg-assets" class="tool-btn" title="导出当前 Session 中所有控件的背景图片资源" onclick="exportSessionBackgroundAssets()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/>
        </svg>
        导出背景
      </button>
      <button id="btn-batch-create" class="tool-btn" title="批量创建控件 (TileView/ListView)" onclick="openBatchCreateDialog()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="6" height="6" rx="1"/><rect x="9" y="3" width="6" height="6" rx="1"/><rect x="16" y="3" width="6" height="6" rx="1"/>
          <rect x="2" y="11" width="6" height="6" rx="1"/><rect x="9" y="11" width="6" height="6" rx="1"/><rect x="16" y="11" width="6" height="6" rx="1"/>
        </svg>
        批量控件
      </button>
    </div>
    <div class="toolbar-right">
      <span id="save-indicator" style="font-size:11px;color:#56cfba;opacity:0;transition:opacity 0.4s;margin-right:8px">✓ 已保存</span>
      <span style="font-size:11px;color:#888;margin-right:4px">存档:</span>
      <span id="session-label" title="当前 Session" style="font-size:11px;color:#9b8af7;font-weight:600;margin-right:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📂 default</span>
      <label>网格 <input type="checkbox" id="toggle-grid" checked /></label>
      <label>对齐 <input type="checkbox" id="toggle-snap" checked /></label>

      <span id="zoom-label">100%</span>
      <button class="tool-btn" id="btn-zoom-in">+</button>
      <button class="tool-btn" id="btn-zoom-out">−</button>
      <button class="tool-btn" id="btn-zoom-reset">重置</button>
    </div>
  </header>

  <!-- 第二行：常用控件 / 容器选择 -->
  <div id="widget-palette">
    <select id="palette-group-select" title="按分类筛选控件">
      <option value="all">全部</option>
      <option value="文本">文本</option>
      <option value="图片">图片</option>
      <option value="按钮">按钮</option>
      <option value="输入">输入</option>
      <option value="反馈">反馈</option>
      <option value="列表">列表</option>
      <option value="工具">工具</option>
      <option value="容器">容器</option>
    </select>
    <div class="palette-divider" id="palette-div-controls"></div>
    <span class="palette-section-label" id="palette-label-controls">常用控件</span>
    <div id="palette-items"></div>
    <div class="palette-divider" id="palette-div-containers"></div>
    <span class="palette-section-label" id="palette-label-containers">常用容器</span>
    <div id="palette-containers"></div>
  </div>

  <div id="main-layout">
    <!-- 左侧菜单 -->
    <aside id="left-menu">
      <div class="panel-title">预设形状</div>
      <div class="preset-list">
        <div class="preset-item" data-w="120" data-h="80" data-label="矩形">⬜ 矩形</div>
        <div class="preset-item" data-w="200" data-h="120" data-label="大框">🔳 大框</div>
        <div class="preset-item" data-w="80" data-h="80" data-label="正方形">◻ 正方形</div>
        <div class="preset-item" data-w="160" data-h="40" data-label="横条">▬ 横条</div>
        <div class="preset-item" data-w="40" data-h="160" data-label="竖条">▮ 竖条</div>
      </div>

      <!-- 文档管理 -->
      <div class="panel-title panel-title-docs" style="margin-top:8px">
        <span>📄 文档</span>
        <button id="sidebar-doc-new" title="新建文档">＋</button>
      </div>
      <ul id="sidebar-doc-list">
        <li class="sidebar-doc-empty">暂无文档</li>
      </ul>
    </aside>
    <div class="panel-resizer resizer-v" id="resizer-left"></div>

    <!-- 中心画布区域 -->
    <main id="center-area">
      <div id="canvas-viewport">
        <!-- grid-canvas sits outside canvas-root so it is NOT affected by zoom transforms -->
        <canvas id="grid-canvas"></canvas>
        <div id="canvas-root">
          <div id="box-layer"></div>
          <div id="selection-overlay"></div>
        </div>
      </div>
    </main>
    <div class="panel-resizer resizer-v" id="resizer-right"></div>

    <!-- 右侧信息面板 -->
    <aside id="right-info">
      <div id="right-tabs">
        <button class="right-tab active" data-tab="props">属性</button>
        <button class="right-tab" data-tab="hierarchy">层级</button>
      </div>
      <div id="right-panel-props">
        <div id="prop-panel">
          <div class="empty-hint">未选中任何元素</div>
        </div>
      </div>
      <div id="right-panel-hierarchy" style="display:none">
        <ul id="hierarchy-list"></ul>
      </div>
    </aside>
  </div>

  <!-- 底部控制台 -->
  <footer id="console-panel">
    <div class="panel-resizer resizer-h" id="resizer-console"></div>
    <div class="console-tabs">
      <button class="console-tab active" id="tab-console" onclick="switchConsoleTab('console')">控制台</button>
      <button class="console-tab" id="tab-chat" onclick="switchConsoleTab('chat')">💬 Chat</button>
      <button id="btn-clear-console" style="margin-left:auto;background:none;border:none;color:#aaa;cursor:pointer;font-size:11px;padding:0 10px">清空</button>
    </div>
    <!-- Console pane -->
    <div id="console-pane">
      <div id="console-output"></div>
    </div>
    <!-- Chat pane -->
    <div id="chat-pane" style="display:none">
      <div id="chat-session-bar">
        <span style="color:#666;font-size:10px">会话:</span>
        <select id="chat-session-id" title="选择 Agent 会话"></select>
        <button id="chat-session-refresh" title="刷新会话列表" style="background:none;border:none;color:#666;cursor:pointer;font-size:13px;padding:0 4px">⟳</button>
      </div>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <textarea id="chat-input" placeholder="输入任务，发给爱丽丝… (Ctrl+Enter 发送)" rows="2"></textarea>
        <button id="chat-send-btn" onclick="chatSend()">发送</button>
      </div>
    </div>
  </footer>

  <!-- Zone highlight: floating cursor tooltip -->
  <div id="zoneLabel"></div>
  <!-- Zone highlight: element outline overlay -->
  <div id="zoneOverlay"></div>
  <!-- Zone highlight: result info panel -->
  <div id="zonePickResult" style="display:none">
    <div id="zonePickTitle">🔍 元素拾取器</div>
    <div id="zonePickInfo"></div>
    <button id="zonePickCopyBtn" title="复制到剪贴板">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      复制
    </button>
    <button id="zonePickClose" title="关闭 (ESC)">✕</button>
  </div>

  <!-- ═══ Assets Panel ═══ -->
  <div id="assets-panel" style="display:none">
    <div id="assets-panel-header">
      <span id="assets-panel-title">📦 资源引用 <span id="assets-count" style="font-size:10px;opacity:0.5"></span></span>
      <div style="display:flex;gap:6px;align-items:center">
        <button id="assets-refresh-btn" title="刷新">↻</button>
        <button id="assets-close-btn" title="关闭">✕</button>
      </div>
    </div>
    <div id="assets-list"></div>
  </div>

  <!-- ═══ Document System Overlay (Alice-style) ═══ -->
  <div id="docs-overlay">
    <!-- Sidebar -->
    <aside id="docs-sidebar">
      <div id="docs-sidebar-header">
        <span class="docs-sidebar-title">📄 文档</span>
        <div class="docs-sidebar-btns">
          <button id="docs-btn-new" title="新建文档 (Ctrl+N)">＋</button>
          <button id="docs-btn-refresh" title="刷新列表">↻</button>
          <button id="docs-btn-close" title="关闭文档系统 (Esc)">✕</button>
        </div>
      </div>
      <div id="docs-search-wrap">
        <input id="docs-search" type="text" placeholder="搜索文档…" autocomplete="off" />
      </div>
      <div id="docs-file-tree"></div>
    </aside>

    <!-- Main area -->
    <div id="docs-main">
      <!-- Welcome screen -->
      <div id="docs-welcome">
        <div class="docs-welcome-inner">
          <div class="docs-welcome-icon">📖</div>
          <h2>Canvas 文档</h2>
          <p>独立存储，与画布项目配套使用</p>
          <button class="docs-welcome-btn" id="docs-welcome-new">＋ 新建文档</button>
        </div>
      </div>

      <!-- Doc editor (shown when a file is open) -->
      <div id="docs-doc-area" style="display:none">
        <!-- Header bar -->
        <div id="docs-doc-header">
          <div id="docs-doc-breadcrumb">
            <span id="docs-doc-title">未命名</span>
          </div>
          <div id="docs-doc-actions">
            <button id="docs-btn-save" title="保存 (Ctrl+S)">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
              </svg>
              保存
            </button>
            <button id="docs-btn-delete" title="删除文档">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              </svg>
              删除
            </button>
          </div>
        </div>

        <!-- Split: editor + preview -->
        <div id="docs-split">
          <div id="docs-editor-pane">
            <div class="docs-pane-hdr">📝 Markdown 编辑器</div>
            <textarea id="docs-textarea" spellcheck="false" placeholder="在此编写 Markdown 内容…"></textarea>
          </div>
          <div id="docs-split-divider"></div>
          <div id="docs-preview-pane">
            <div class="docs-pane-hdr">👁 预览</div>
            <div id="docs-preview" class="markdown-preview"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- New doc/folder modal -->
  <div id="docs-modal-overlay">
    <div id="docs-modal">
      <div class="docs-modal-tabs">
        <button class="docs-modal-tab active" data-mode="doc">📄 新建文档</button>
        <button class="docs-modal-tab" data-mode="folder">📁 新建文件夹</button>
      </div>
      <p class="docs-modal-hint" id="docs-modal-hint">文档名（可用 / 指定路径，如 <code>项目/笔记</code>）</p>
      <input id="docs-modal-input" type="text" placeholder="名称…" autocomplete="off" />
      <div class="docs-modal-btns">
        <button id="docs-modal-cancel">取消</button>
        <button id="docs-modal-confirm" class="primary">创建</button>
      </div>
    </div>
  </div>

  <!-- Assets panel modal -->
  <div id="assets-modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9000;align-items:center;justify-content:center">
    <div id="assets-modal" style="background:var(--bg-panel,#1e1e2e);border:1px solid var(--border,#3a3a5c);border-radius:8px;width:680px;max-width:90vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.6)">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border,#3a3a5c)">
        <span style="font-size:14px;font-weight:600;color:var(--accent2,#9b8af7)">📦 当前界面引用资源</span>
        <button onclick="closeAssetsPanel()" style="background:none;border:none;color:#888;font-size:18px;cursor:pointer;line-height:1">✕</button>
      </div>
      <div id="assets-modal-body" style="overflow-y:auto;flex:1;padding:12px 16px"></div>
    </div>
  </div>

  <!-- Icon Picker Modal -->
  <div id="icon-picker-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9500;align-items:center;justify-content:center">
    <div id="icon-picker-modal" style="background:var(--bg-panel,#1e1e2e);border:1px solid var(--border,#3a3a5c);border-radius:8px;width:560px;max-width:92vw;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.7)">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border,#3a3a5c)">
        <span style="font-size:14px;font-weight:600;color:var(--accent2,#9b8af7)">🎨 选择图标</span>
        <button onclick="closeIconPicker()" style="background:none;border:none;color:#888;font-size:18px;cursor:pointer;line-height:1">✕</button>
      </div>
      <div style="padding:8px 12px;border-bottom:1px solid var(--border,#3a3a5c)">
        <input id="icon-picker-search" type="text" placeholder="搜索图标名…" autocomplete="off"
          style="width:100%;box-sizing:border-box;padding:6px 10px;background:var(--bg-dark,#12121a);color:var(--text,#ccc);border:1px solid var(--border,#3a3a5c);border-radius:4px;font-size:12px"
          oninput="filterIconPicker(this.value)"/>
        <div id="icon-picker-tabs" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px"></div>
      </div>
      <div id="icon-picker-grid" style="overflow-y:auto;flex:1;padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px"></div>
    </div>
  </div>

  <!-- Image Browser Modal -->
  <div id="img-browser-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9600;align-items:center;justify-content:center">
    <div id="img-browser-modal" style="background:var(--bg-panel,#1e1e2e);border:1px solid var(--border,#3a3a5c);border-radius:8px;width:720px;max-width:94vw;max-height:86vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.8)">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border,#3a3a5c)">
        <span style="font-size:14px;font-weight:600;color:#56cfba">🖼️ 图片资源库</span>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="img-browser-search" type="text" placeholder="搜索文件名…" autocomplete="off"
            style="padding:4px 10px;background:var(--bg-dark,#12121a);color:var(--text,#ccc);border:1px solid var(--border,#3a3a5c);border-radius:4px;font-size:12px;width:180px"
            oninput="filterImgBrowser(this.value)"/>
          <button onclick="closeImgBrowser()" style="background:none;border:none;color:#888;font-size:18px;cursor:pointer;line-height:1">✕</button>
        </div>
      </div>
      <div id="img-browser-folders" style="display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border,#3a3a5c);flex-wrap:wrap"></div>
      <div id="img-browser-grid" style="overflow-y:auto;flex:1;padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px"></div>
      <div id="img-browser-status" style="padding:6px 16px;border-top:1px solid var(--border,#3a3a5c);font-size:11px;color:#666"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="app.js?v=1773388408701"></script>
</html>
