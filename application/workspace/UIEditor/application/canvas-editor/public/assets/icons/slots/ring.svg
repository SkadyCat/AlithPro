<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#100a04"/><stop offset="100%" stop-color="#030201"/>
    </radialGradient>
    <radialGradient id="band" cx="35%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="30%" stop-color="#c8a030"/>
      <stop offset="60%" stop-color="#a07820"/>
      <stop offset="100%" stop-color="#503c08"/>
    </radialGradient>
    <radialGradient id="gem" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#80a0ff"/>
      <stop offset="30%" stop-color="#2040d0"/>
      <stop offset="70%" stop-color="#102080"/>
      <stop offset="100%" stop-color="#08103a"/>
    </radialGradient>
    <radialGradient id="gem-face" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#c0d0ff"/>
      <stop offset="40%" stop-color="#4060e0"/>
      <stop offset="100%" stop-color="#102070"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="setting" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c040"/><stop offset="100%" stop-color="#6a4808"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="6" fill="url(#bg)"/>
  <!-- Ring band (circle) -->
  <circle cx="32" cy="40" r="16" fill="none" stroke="url(#band)" stroke-width="5"/>
  <!-- Inner shadow of band -->
  <circle cx="32" cy="40" r="13.5" fill="none" stroke="#1a1004" stroke-width="1" opacity="0.8"/>
  <!-- Band highlight top-left -->
  <path d="M19,28 Q26,20 38,24" fill="none" stroke="#f8e898" stroke-width="1.5" opacity="0.6"/>
  <!-- Band shadow bottom -->
  <path d="M19,52 Q26,58 40,56" fill="none" stroke="#2a1c04" stroke-width="2" opacity="0.5"/>
  <!-- Gem setting on top -->
  <path d="M22,22 Q32,16 42,22 L40,28 Q32,24 24,28Z" fill="url(#setting)"/>
  <!-- Setting prongs -->
  <line x1="25" y1="22" x2="26" y2="28" stroke="#f0d050" stroke-width="1.2"/>
  <line x1="32" y1="19" x2="32" y2="25" stroke="#f0d050" stroke-width="1.2"/>
  <line x1="39" y1="22" x2="38" y2="28" stroke="#f0d050" stroke-width="1.2"/>
  <!-- Gemstone glow -->
  <ellipse cx="32" cy="18" rx="10" ry="7" fill="#2040c0" opacity="0.3" filter="url(#glow)"/>
  <!-- Gemstone body -->
  <path d="M22,18 Q32,10 42,18 Q42,26 32,28 Q22,26 22,18Z" fill="url(#gem)"/>
  <!-- Gem facets -->
  <path d="M22,18 L32,12 L42,18 L32,28Z" fill="url(#gem-face)" opacity="0.7"/>
  <path d="M22,18 L32,28 L32,12" fill="none" stroke="#8090e0" stroke-width="0.5" opacity="0.5"/>
  <path d="M42,18 L32,12 L32,28" fill="none" stroke="#4050c0" stroke-width="0.5" opacity="0.5"/>
  <!-- Gem top highlights -->
  <ellipse cx="28" cy="14" rx="4" ry="2.5" fill="white" opacity="0.35"/>
  <ellipse cx="26" cy="13" rx="2" ry="1.2" fill="white" opacity="0.4"/>
  <!-- Gem sparkle -->
  <circle cx="38" cy="14" r="1.5" fill="white" opacity="0.5"/>
</svg>
