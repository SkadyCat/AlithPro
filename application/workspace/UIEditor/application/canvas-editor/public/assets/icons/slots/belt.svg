<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#100c06"/><stop offset="100%" stop-color="#030201"/>
    </radialGradient>
    <linearGradient id="leather" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a3018"/><stop offset="40%" stop-color="#7a4020"/><stop offset="100%" stop-color="#2e1608"/>
    </linearGradient>
    <linearGradient id="buckle" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#e0c050"/><stop offset="40%" stop-color="#f8e070"/><stop offset="100%" stop-color="#805810"/>
    </linearGradient>
    <radialGradient id="pouch" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#6a3820"/><stop offset="100%" stop-color="#2a1008"/>
    </radialGradient>
    <linearGradient id="stitch" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c89040"/><stop offset="100%" stop-color="#a07030"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="6" fill="url(#bg)"/>
  <!-- Main belt strap -->
  <rect x="4" y="24" width="56" height="16" rx="3" fill="url(#leather)"/>
  <!-- Top highlight -->
  <rect x="4" y="24" width="56" height="3" rx="2" fill="#9a5828" opacity="0.6"/>
  <!-- Stitch lines -->
  <path d="M4,26 L60,26" stroke="#c09040" stroke-width="0.5" stroke-dasharray="3,2" opacity="0.5"/>
  <path d="M4,38 L60,38" stroke="#c09040" stroke-width="0.5" stroke-dasharray="3,2" opacity="0.5"/>
  <!-- Buckle (center) -->
  <rect x="24" y="22" width="16" height="20" rx="2" fill="url(#buckle)"/>
  <rect x="26" y="24" width="12" height="16" rx="1" fill="#1a1204"/>
  <!-- Buckle prong -->
  <rect x="31" y="23" width="2" height="18" rx="1" fill="url(#buckle)"/>
  <rect x="31.3" y="23" width="0.8" height="18" fill="white" opacity="0.3"/>
  <!-- Buckle frame highlight -->
  <path d="M24,24 Q32,22 40,24" fill="none" stroke="#fff8a0" stroke-width="0.7" opacity="0.6"/>
  <!-- Left pouch -->
  <rect x="7" y="30" width="14" height="18" rx="3" fill="url(#pouch)"/>
  <rect x="7" y="30" width="14" height="5" rx="2" fill="#4a2010" opacity="0.7"/>
  <!-- Pouch flap -->
  <path d="M7,34 Q14,32 21,34" fill="url(#leather)" stroke="#c09040" stroke-width="0.8"/>
  <!-- Pouch strap -->
  <rect x="12" y="32" width="4" height="2" rx="1" fill="url(#buckle)" opacity="0.8"/>
  <!-- Pouch stitch -->
  <path d="M8,37 L20,37" stroke="#c09040" stroke-width="0.4" stroke-dasharray="2,2" opacity="0.5"/>
  <!-- Right pouch -->
  <rect x="43" y="30" width="14" height="18" rx="3" fill="url(#pouch)"/>
  <rect x="43" y="30" width="14" height="5" rx="2" fill="#4a2010" opacity="0.7"/>
  <!-- Right pouch flap -->
  <path d="M43,34 Q50,32 57,34" fill="url(#leather)" stroke="#c09040" stroke-width="0.8"/>
  <!-- Right pouch strap -->
  <rect x="48" y="32" width="4" height="2" rx="1" fill="url(#buckle)" opacity="0.8"/>
  <!-- Right pouch stitch -->
  <path d="M44,37 L56,37" stroke="#c09040" stroke-width="0.4" stroke-dasharray="2,2" opacity="0.5"/>
  <!-- Belt holes -->
  <circle cx="20" cy="32" r="1" fill="#0e0804"/>
  <circle cx="23" cy="32" r="1" fill="#0e0804"/>
  <circle cx="41" cy="32" r="1" fill="#0e0804"/>
  <circle cx="44" cy="32" r="1" fill="#0e0804"/>
</svg>
