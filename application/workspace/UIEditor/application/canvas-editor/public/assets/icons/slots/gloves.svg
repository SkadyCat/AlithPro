    <linearGradient id="leather" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a2c10"/><stop offset="100%" stop-color="#1c0c04"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="6" fill="url(#bg)"/>
  <!-- Wrist cuff left -->
  <path d="M8,24 Q8,18 16,18 L20,18 L20,30 Q20,36 16,38 Q8,36 8,30Z" fill="url(#metal)"/>
  <path d="M8,24 Q16,20 20,22" fill="none" stroke="white" stroke-width="0.6" opacity="0.3"/>
