  <path d="M8,34 Q15,32 22,34" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <path d="M8,24 Q8,18 16,18" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Wrist cuff right -->
  <path d="M56,24 Q56,18 48,18 L44,18 L44,30 Q44,36 48,38 Q56,36 56,30Z" fill="url(#metal)"/>
  <path d="M56,24 Q48,20 44,22" fill="none" stroke="white" stroke-width="0.6" opacity="0.3"/>
  <!-- Right finger plates -->
  <rect x="49" y="36" width="5" height="12" rx="2" fill="url(#metal)"/>
  <rect x="49" y="36" width="5" height="4" fill="white" opacity="0.15" rx="2"/>
  <rect x="43" y="34" width="5" height="14" rx="2" fill="url(#metal)"/>
  <rect x="43" y="34" width="5" height="4" fill="white" opacity="0.15" rx="2"/>
  <rect x="49" y="47" width="5" height="4" rx="1.5" fill="url(#metal)" stroke="url(#gold)" stroke-width="0.5"/>
  <rect x="43" y="47" width="5" height="4" rx="1.5" fill="url(#metal)" stroke="url(#gold)" stroke-width="0.5"/>
  <!-- Right thumb -->
  <path d="M58,30 Q60,32 59,37 Q56,38 54,36 L54,30Z" fill="url(#metal)"/>
