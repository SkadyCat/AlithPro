<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#020304"/>
    </radialGradient>
    <radialGradient id="helm-main" cx="35%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#c0c8d8"/>
      <stop offset="40%" stop-color="#7080a0"/>
      <stop offset="80%" stop-color="#303848"/>
      <stop offset="100%" stop-color="#1a2030"/>
    </radialGradient>
    <linearGradient id="helm-side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="15%" stop-color="#5060808"/>
      <stop offset="40%" stop-color="#8090b0"/>
      <stop offset="60%" stop-color="#606878"/>
      <stop offset="100%" stop-color="#1c2232"/>
    </linearGradient>
    <linearGradient id="visor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#101820" stop-opacity="1"/>
      <stop offset="100%" stop-color="#050810" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="trim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0a830"/>
      <stop offset="50%" stop-color="#f8e060"/>
      <stop offset="100%" stop-color="#7a5010"/>
    </linearGradient>
    <filter id="sheen">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="6" fill="url(#bg)"/>
  <!-- Helm dome -->
  <path d="M14,38 Q14,12 32,8 Q50,12 50,38 L50,44 Q50,46 32,47 Q14,46 14,44 Z" fill="url(#helm-side)"/>
  <!-- Dome highlight -->
  <path d="M22,13 Q32,9 42,13 Q38,20 32,22 Q26,20 22,13Z" fill="white" opacity="0.18"/>
  <!-- Specular -->
  <ellipse cx="28" cy="16" rx="5" ry="3" fill="white" opacity="0.25" filter="url(#sheen)"/>
  <!-- Cheek guards -->
  <path d="M14,38 Q12,44 14,50 Q20,52 24,50 L24,44" fill="url(#helm-side)"/>
  <path d="M50,38 Q52,44 50,50 Q44,52 40,50 L40,44" fill="url(#helm-side)"/>
  <!-- Cheek highlights -->
  <path d="M14,38 Q13,41 14,44" fill="none" stroke="#a0b0c8" stroke-width="0.8" opacity="0.5"/>
  <path d="M50,38 Q51,41 50,44" fill="none" stroke="#a0b0c8" stroke-width="0.8" opacity="0.5"/>
  <!-- Visor opening -->
  <path d="M20,38 Q20,34 32,33 Q44,34 44,38 L44,44 Q44,46 32,47 Q20,46 20,44Z" fill="url(#visor)"/>
  <!-- Eye slits -->
  <rect x="21" y="37" width="9" height="2" rx="1" fill="#202830" stroke="#404858" stroke-width="0.3"/>
  <rect x="34" y="37" width="9" height="2" rx="1" fill="#202830" stroke="#404858" stroke-width="0.3"/>
  <!-- Nasal guard -->
  <rect x="31" y="30" width="2" height="14" rx="1" fill="url(#helm-side)"/>
  <rect x="31.3" y="30" width="0.8" height="14" fill="white" opacity="0.2"/>
  <!-- Gold rim at brow -->
  <path d="M14,38 Q32,35 50,38" fill="none" stroke="url(#trim)" stroke-width="2"/>
  <path d="M14,38 Q32,35 50,38" fill="none" stroke="#fff8a0" stroke-width="0.5" opacity="0.6"/>
  <!-- Gold trim on edges -->
  <path d="M14,38 Q14,12 32,8 Q50,12 50,38" fill="none" stroke="url(#trim)" stroke-width="1.5"/>
  <!-- Plume base -->
  <rect x="30" y="6" width="4" height="4" rx="1" fill="#c8a030"/>
</svg>
